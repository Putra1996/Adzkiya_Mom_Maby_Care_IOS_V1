<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adzkiya Mom Baby Care - Advanced Ledger & Reservation Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* --- Clean & Crisp UI Theme --- */
        * { 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        :root {
            --theme-color: #FF5A79; 
            --theme-glow: rgba(255, 90, 121, 0.2);
            --bg-gradient: linear-gradient(135deg, #090615 0%, #0f0b21 40%, #1a0816 80%, #0b081d 100%);
            --card-bg: rgba(20, 16, 36, 0.8); 
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF; 
            --text-sub: #E2E8F0;  
            --input-bg: rgba(255, 255, 255, 0.06);
            --input-border: rgba(255, 255, 255, 0.2); 
            --item-hover: rgba(255, 255, 255, 0.1);
            --item-border: rgba(255, 255, 255, 0.12);
            --shadow-fluid: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            --tab-bg: rgba(255, 255, 255, 0.05);
            --watermark-opacity: 0.04;
        }

        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #e6edf5 0%, #d5e0eb 40%, #fbcfe8 80%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.85); 
            --card-border: rgba(0, 0, 0, 0.12);
            --text-main: #111827; 
            --text-sub: #374151;  
            --input-bg: rgba(0, 0, 0, 0.04);
            --input-border: rgba(0, 0, 0, 0.15); 
            --item-hover: rgba(0, 0, 0, 0.04);
            --item-border: rgba(0, 0, 0, 0.06);
            --shadow-fluid: 0 30px 60px rgba(15, 23, 42, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            --tab-bg: rgba(0, 0, 0, 0.04);
            --watermark-opacity: 0.07;
        }

        body { 
            background: var(--bg-gradient); 
            min-height: 100vh;
            padding: 40px 20px; 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 25px;
            transition: background 0.5s ease;
        }

        .container, .recap-container, .reservation-container { 
            position: relative; 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px; 
            padding: 30px 24px; 
            box-shadow: var(--shadow-fluid);
            width: 100%;
            max-width: 440px; 
            transition: background 0.4s ease, border 0.4s ease;
        }

        .admin-only { display: none !important; }
        body.admin-mode .admin-only { display: block !important; }

        .ui-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px; 
            height: 260px;
            object-fit: contain;
            opacity: var(--watermark-opacity);
            pointer-events: none; 
            z-index: 0;
        }

        .brand-section, .color-palette, .form-group, .live-total-panel, .btn-block, .recap-content, .reservation-content {
            position: relative;
            z-index: 1;
        }

        .brand-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        h2 { 
            font-size: 20px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
        }
        h2 .accent-part { color: var(--theme-color); }
        h2 .neutral-part { color: var(--text-main); margin-left: 4px; font-weight: 700; }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .mode-toggle, .role-toggle {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            cursor: pointer;
            font-size: 14px;
            padding: 0 10px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        .mode-toggle:hover, .role-toggle:hover { transform: scale(1.05); }
        .role-toggle.admin-active {
            background: var(--theme-color);
            color: white;
            border-color: transparent;
        }

        .color-palette {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: var(--input-bg);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid var(--input-border);
        }
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .color-dot.active { border-color: var(--text-main); box-shadow: 0 0 8px var(--theme-glow); }

        .form-group { margin-bottom: 16px; }
        .form-group label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 700; 
            font-size: 12px; 
            color: var(--text-sub); 
            letter-spacing: 0.3px;
        }
        
        input[type="text"], input[type="tel"], input[type="number"], input[type="file"], input[type="datetime-local"] { 
            width: 100%; 
            padding: 12px 14px; 
            background: var(--input-bg);
            border: 1px solid var(--input-border); 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--text-main);
            outline: none; 
            transition: all 0.3s ease;
        }
        input[type="datetime-local"] { color-scheme: dark; }
        body.light-mode input[type="datetime-local"] { color-scheme: light; }
        input[type="file"] { padding: 9px; font-size: 12px; cursor: pointer; }
        input:focus { 
            border-color: var(--theme-color); 
            box-shadow: 0 0 0 3px var(--theme-glow);
        }

        .category-tabs {
            display: flex;
            background: var(--tab-bg);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            margin-bottom: 10px;
            overflow-x: auto;
            gap: 4px;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        
        .tab-btn {
            flex: 0 0 auto;
            background: transparent;
            border: none;
            color: var(--text-sub);
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 700; 
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--text-main); color: #110e20; }
        body.light-mode .tab-btn.active { background: #111827; color: #FFFFFF; }

        .scroll-wrapper { position: relative; width: 100%; }
        .service-list { 
            max-height: 180px; 
            overflow-y: auto; 
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px; 
            padding: 4px 0;
            padding-right: 40px; 
        }
        .service-list::-webkit-scrollbar { display: none; } 
        .menu-pane { display: none; }
        .menu-pane.active { display: block; }

        .scroll-navigation-panel {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10;
        }
        .scroll-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            width: 26px;
            height: 26px;
            border-radius: 8px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scroll-btn:hover { background: var(--theme-color); color: white; }

        .service-item { 
            display: flex; 
            align-items: center; 
            padding: 11px 14px; 
            border-bottom: 1px solid var(--item-border); 
            cursor: pointer;
            width: 100%;
        }
        .service-item:hover { background: var(--item-hover); }
        .service-item.selected { background: rgba(255, 255, 255, 0.12); }
        body.light-mode .service-item.selected { background: rgba(0, 0, 0, 0.05); }
        .service-item:last-child { border-bottom: none; }
        
        input[type="checkbox"] { 
            width: 18px; 
            height: 18px; 
            margin-right: 12px; 
            accent-color: var(--theme-color); 
            cursor: pointer;
            flex-shrink: 0;
        }
        .service-item span { 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-main); 
        }

        .live-total-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0 15px 0;
            padding: 0 2px;
        }
        .live-total-label { font-size: 11px; color: var(--text-sub); text-transform: uppercase; font-weight: 700; }
        .live-total-value { font-size: 22px; font-weight: 800; color: var(--text-main); }

        button.btn-block { 
            width: 100%; 
            background: linear-gradient(180deg, var(--theme-color) 0%, rgba(244, 63, 94, 1) 100%);
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px; 
            font-size: 15px; 
            font-weight: 700; 
            border-radius: 14px; 
            cursor: pointer; 
            box-shadow: 0 10px 20px var(--theme-glow);
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }
        button.btn-block:hover { transform: translateY(-1px); opacity: 0.95; }
        button.btn-block:active { transform: scale(0.99); }
        
        button.btn-secondary {
            background: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--input-border);
            box-shadow: none;
        }
        button.btn-secondary:hover { background: var(--item-hover); }

        .recap-header, .reservation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .recap-header h3, .reservation-header h3 { font-size: 15px; font-weight: 800; }
        .recap-action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

        .income-summary-panel {
            background: var(--input-bg);
            border: 1px dashed var(--theme-color);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 15px;
        }
        .income-panel-title {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .income-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        body.light-mode .income-row { border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .income-row:last-child { border-bottom: none; }
        .income-row .month-lbl { color: var(--text-main); }
        .income-row .amount-val { color: var(--theme-color); font-weight: 800; }

        .recap-list, .reservation-list {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            padding-right: 2px;
        }
        .recap-list::-webkit-scrollbar, .reservation-list::-webkit-scrollbar { width: 4px; }
        .recap-list::-webkit-scrollbar-thumb, .reservation-list::-webkit-scrollbar-thumb { background: var(--input-border); border-radius: 4px; }
        
        .month-group-title {
            font-size: 12px;
            font-weight: 800;
            color: var(--theme-color);
            background: rgba(255, 90, 121, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid var(--theme-color);
        }
        body.light-mode .month-group-title { background: rgba(0, 0, 0, 0.05); }

        .recap-item, .reservation-item {
            background: var(--input-bg);
            border: 1px solid var(--item-border);
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            position: relative;
            margin-left: 4px;
        }
        .recap-item .name, .reservation-item .name { font-weight: 700; color: var(--text-main); margin-bottom: 3px; }
        .recap-item .details, .reservation-item .details { color: var(--text-sub); opacity: 0.85; font-size: 11px; margin-bottom: 2px; }
        .recap-item .price, .reservation-item .price { font-weight: 800; color: var(--theme-color); text-align: right; margin-top: 4px; font-size: 13px; }
        
        .btn-item-action {
            position: absolute;
            top: 10px;
            background: transparent;
            border: none;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-delete { right: 12px; color: #f43f5e; }
        .btn-reprint { right: 34px; color: #3b82f6; }

        .reservation-actions-panel {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }
        .btn-acc { background: #10b981; color: white; border: none; padding: 4px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 4px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }

        .security-section {
            border-top: 1px dashed var(--input-border);
            margin-top: 12px;
            padding-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
        }
        .security-btn {
            width: 48%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .security-btn:hover { background: var(--theme-color); color: white; border-color: transparent; }
        .hidden-file-input { display: none; }

        .toast-notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1e1b4b;
            color: #ffffff;
            border-left: 5px solid #ef4444;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 99999;
            max-width: 320px;
            font-size: 13px;
            animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.light-mode .toast-notification { background: #ffffff; color: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .toast-title { font-weight: 800; color: #ef4444; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .toast-close { position: absolute; top: 8px; right: 10px; background: transparent; border: none; color: var(--text-sub); cursor: pointer; font-size: 14px; font-weight: bold; }

        @keyframes slideInUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- Loader Backdrop Styles --- */
        .db-loader-backdrop {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 8, 29, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 999999; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        body.light-mode .db-loader-backdrop { background: rgba(241, 245, 249, 0.85); }
        .db-loader-backdrop.active { opacity: 1; pointer-events: auto; }
        .db-loader-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 30px 40px; border-radius: 20px;
            box-shadow: var(--shadow-fluid);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            text-align: center; max-width: 320px; width: 90%;
        }
        .db-loader-spinner {
            width: 50px; height: 50px;
            border: 4px solid var(--input-border);
            border-top-color: var(--theme-color);
            border-radius: 50%;
            animation: dbSpin 0.8s linear infinite;
        }
        .db-loader-status-icon { display: none; font-size: 40px; line-height: 1; }
        .db-loader-text { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .db-loader-subtext { font-size: 11px; font-weight: 500; color: var(--text-sub); opacity: 0.7; }
        @keyframes dbSpin { to { transform: rotate(360deg); } }

        .progress-bar-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-top: 5px;
            display: none;
        }
        body.light-mode .progress-bar-container { background: rgba(0, 0, 0, 0.1); }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--theme-color);
            border-radius: 10px;
            transition: width 0.1s linear;
        }
        .percent-badge { font-size: 18px; font-weight: 800; color: var(--theme-color); margin-top: -5px; display: none; }
    </style>
</head>
<body onload="verifyLicenseGateKey()">

<div id="dbLoaderComponent" class="db-loader-backdrop">
    <div class="db-loader-card">
        <div id="dbLoaderSpinner" class="db-loader-spinner"></div>
        <div id="dbLoaderIcon" class="db-loader-status-icon"></div>
        <div id="dbPercentBadge" class="percent-badge">0%</div>
        <div class="progress-bar-container" id="progressBarContainer">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
        <div id="dbLoaderText" class="db-loader-text">Sinkronisasi Data...</div>
        <div id="dbLoaderSubtext" class="db-loader-subtext">Mohon jangan menutup aplikasi</div>
    </div>
</div>

<div class="container">
    <img class="ui-watermark" id="uiWatermarkView" src="" alt="" style="display: none;">

    <div class="brand-section">
        <h2><span class="accent-part">Adzkiya</span><span class="neutral-part">Mom Baby Care</span></h2>
        <div class="header-actions">
            <button class="role-toggle" id="roleToggleBtn" onclick="toggleUserRoleMode()">👤 Pasien</button>
            <button class="mode-toggle" onclick="toggleUIVisualMode()">🌓</button>
        </div>
    </div>

    <div class="color-palette">
        <div class="color-dot active" style="background: #FF5A79;" onclick="changeUITheme('#FF5A79', 'rgba(255, 90, 121, 0.2)', this)"></div>
        <div class="color-dot" style="background: #2DD4BF;" onclick="changeUITheme('#2DD4BF', 'rgba(45, 212, 191, 0.2)', this)"></div>
        <div class="color-dot" style="background: #3B82F6;" onclick="changeUITheme('#3B82F6', 'rgba(59, 130, 246, 0.2)', this)"></div>
        <div class="color-dot" style="background: #A855F7;" onclick="changeUITheme('#A855F7', 'rgba(168, 85, 247, 0.2)', this)"></div>
        <div class="color-dot" style="background: #F59E0B;" onclick="changeUITheme('#F59E0B', 'rgba(245, 158, 11, 0.2)', this)"></div>
    </div>

    <div class="form-group admin-only">
        <label>Upload Logo Klinik / Praktik</label>
        <input type="file" id="logoUploader" accept="image/png, image/jpeg, image/jpg" onchange="processLogoImageFile(this)">
    </div>

    <div class="form-group">
        <label>Nama Pelanggan / Pasien</label>
        <input type="text" id="namaPasien" placeholder="Masukkan nama lengkap">
    </div>

    <div class="form-group">
        <label>Nomor HP / WhatsApp</label>
        <input type="tel" id="nomorHp" placeholder="Contoh: 081234567xxx">
    </div>

    <div class="form-group">
        <label>Alamat Lengkap Pasien</label>
        <input type="text" id="alamatPasien" placeholder="Contoh: RT 02 RW 04, Desa Klumprit">
    </div>

    <div class="form-group">
        <label>Waktu & Jam Reservasi Treatment</label>
        <input type="datetime-local" id="waktuReservasi">
    </div>

    <div class="form-group admin-only">
        <label>Potongan Diskon (Rp)</label>
        <input type="number" id="diskonHarga" placeholder="0" value="0" oninput="calculateLiveTotalBill()">
    </div>

    <div class="form-group">
        <label>Kategori & Layanan Treatment</label>
        <div class="category-tabs" id="categoryTabsLayout"></div>
        
        <div class="scroll-wrapper">
            <div class="service-list" id="serviceContainer"></div>
            <div class="scroll-navigation-panel">
                <button class="scroll-btn" onclick="scrollServiceList('up')">▲</button>
                <button class="scroll-btn" onclick="scrollServiceList('down')">▼</button>
            </div>
        </div>
    </div>

    <div class="live-total-panel">
        <span class="live-total-label">Total Pembayaran</span>
        <span class="live-total-value" id="liveTotalDisplay">Rp 0</span>
    </div>

    <button class="btn-block" id="btnKirimReservasi" onclick="sendReservationRequest()">Kirim Reservasi Treatment</button>
    
    <button class="btn-block admin-only" onclick="generatePremiumInvoicePDF()">Cetak PDF Kwitansi</button>
    <button class="btn-block btn-secondary admin-only" onclick="saveCustomerToRecapDirect()">Simpan Langsung ke Rekapan</button>
</div>

<div class="reservation-container admin-only">
    <div class="reservation-content">
        <div class="reservation-header">
            <h3>⏳ Daftar Tunggu Reservasi</h3>
        </div>
        <div class="reservation-list" id="reservationListContainer"></div>
    </div>
</div>

<div class="recap-container admin-only">
    <div class="recap-content">
        <div class="recap-header">
            <h3>📋 Rekapan Data Pelanggan (ACC)</h3>
            <div class="recap-action-buttons">
                <button class="scroll-btn" style="width: auto; padding: 4px 12px; background: #10b981; border: none; color: white; font-weight: bold; font-size: 11px; border-radius: 8px;" onclick="exportRecapToExcelXML()">Cetak Excel</button>
            </div>
        </div>

        <div class="income-summary-panel">
            <div class="income-panel-title">💰 Total Penghasilan Per Bulan</div>
            <div id="incomeRowsContainer"></div>
        </div>
        
        <div class="recap-list" id="recapListContainer"></div>

        <div class="security-section">
            <button class="security-btn" style="background: #2563eb; color: white;" onclick="backupDatabaseToJSON()">💾 Backup Offline</button>

    function animatePercentageCounter(start, end, duration, onUpdate, onComplete) {
        const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const value = Math.floor(start + progress * (end - start));
            onUpdate(value);
            if (progress < 1) {
                requestAnimationFrame(update);
            } else if (onComplete) {
                onComplete();
            }
        }
        requestAnimationFrame(update);
    }

        for (const category in medicalServicesDataset) {

            const tabBtn = document.createElement('button');
            tabBtn.className = `tab-btn ${isFirst ? 'active' : ''}`;
            tabBtn.innerText = category;

            tabsContainer.appendChild(tabBtn);

            const pane = document.createElement('div');
            pane.className = `menu-pane ${isFirst ? 'active' : ''}`;
            pane.id = `pane-${categoryId}`;

            medicalServicesDataset[category].forEach(srv => {
                const item = document.createElement('div');
                item.className = 'service-item';
                
                const chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.onchange = () => toggleServiceSelection(srv, category, chk, item);

                const label = document.createElement('span');
                label.innerText = `${srv.name} (Rp ${srv.price.toLocaleString('id-ID')})`;

                item.appendChild(chk);
                item.appendChild(label);
                
                item.onclick = (e) => {
                    if (e.target !== chk) {
                        chk.checked = !chk.checked;
                        toggleServiceSelection(srv, category, chk, item);
                    }
                };
                pane.appendChild(item);
            });

    function sendReservationRequest() {
        const nama = document.getElementById('namaPasien').value.trim();
        const telp = document.getElementById('nomorHp').value.trim();
        const alamat = document.getElementById('alamatPasien').value.trim();
        const waktuRaw = document.getElementById('waktuReservasi').value;
        const diskon = parseInt(document.getElementById('diskonHarga').value) || 0;

        if (!nama) { alert("Silakan masukkan Nama Lengkap Anda."); return; }
        if (!waktuRaw) { alert("Silakan tentukan Waktu & Jam Reservasi terlebih dahulu."); return; }
        if (selectedServices.length === 0) { alert("Silakan pilih minimal satu layanan treatment."); return; }

        let totalLayanan = selectedServices.reduce((sum, s) => sum + s.price, 0);
        let totalAkhir = Math.max(0, totalLayanan - diskon);

        const rawServicesStructured = JSON.parse(JSON.stringify(selectedServices));
        const daftarLayananText = selectedServices.map(s => s.name).join(", ");
        
        const now = new Date();
        const keyBulan = now.toLocaleString('id-ID', { month: 'long', year: 'numeric' });
        const tanggalLengkap = now.toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });

        const reservasiBaru = {
            id: Date.now(),
            nama: nama,
            telp: telp || "-",
            alamat: alamat || "-",
            waktuISO: waktuRaw,
            layanan: daftarLayananText,
            rawServices: rawServicesStructured,
            subtotal: totalLayanan,
            diskon: diskon,
            total: totalAkhir,
            tanggal: tanggalLengkap,
            kelompokBulan: keyBulan
        };

        // BUGFIX TERBARU: Sisi pasien sekarang secara otomatis memasukkan antrean ke dalam antrean reservasi (Daftar Tunggu) saja.
        // Data baru akan masuk ke dalam REKAPAN setelah Admin menekan tombol "✔ ACC" pada panel Daftar Tunggu.
        let dataReservasi = localStorage.getItem("adzkiya_reservation_data");
        dataReservasi = dataReservasi ? JSON.parse(dataReservasi) : [];
        dataReservasi.unshift(reservasiBaru);
        localStorage.setItem("adzkiya_reservation_data", JSON.stringify(dataReservasi));

        alert("✨ Reservasi Anda berhasil dikirim! Silakan hubungi Admin untuk persetujuan (ACC).");
        resetFormInputs();
        loadReservationRecords();
        loadRecapRecords();
    }

    function checkUpcomingReservationsEngine() {
        let dataRekap = localStorage.getItem("adzkiya_recap_data");
        dataRekap = dataRekap ? JSON.parse(dataRekap) : [];
        const sekarang = new Date();

        dataRekap.forEach(item => {
            if (item.waktuISO) {
                const waktuTarget = new Date(item.waktuISO);
                const selisihMilidetik = waktuTarget - sekarang;
                const selisihMenit = Math.floor(selisihMilidetik / 60000);

                if (selisihMenit >= 0 && selisihMenit <= 30) {
                    if (!notifiedReservations[item.id]) {
                        triggerSystemNotificationAlert(item, selisihMenit);
                        notifiedReservations[item.id] = true;
                    }
                }
            }
        });
    }

    function triggerSystemNotificationAlert(item, sisaMenit) {
        const pesanNotif = `Halo, jadwal treatment "${item.layanan}" atas nama ${item.nama} akan dimulai dalam ${sisaMenit} menit lagi!`;
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification("⏰ Pengingat Reservasi Adzkiya", { body: pesanNotif, icon: base64LogoDataStream || "" });
        }

        const toast = document.createElement("div");
        toast.className = "toast-notification";
        toast.innerHTML = `
            <button class="toast-close" onclick="this.parentElement.remove()">×</button>
            <div class="toast-title">⏰ JADWAL MENDEKATI WAKTUNYA</div>
            <div><strong>${item.nama}</strong> (${item.telp})</div>
            <div style="margin-top:4px; font-style:italic;">${pesanNotif}</div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => { if(toast.parentNode) toast.remove(); }, 15000);
    }

    function loadReservationRecords() {
        const container = document.getElementById('reservationListContainer');
        if (!container) return;
        container.innerHTML = "";

        let dataReservasi = localStorage.getItem("adzkiya_reservation_data");
        dataReservasi = dataReservasi ? JSON.parse(dataReservasi) : [];

        if (dataReservasi.length === 0) {
            container.innerHTML = `<div style="text-align:center; font-size:12px; opacity:0.5; padding:20px;">Belum ada daftar tunggu reservasi baru.</div>`;
            return;
        }

        dataReservasi.forEach(item => {
            const card = document.createElement('div');
            card.className = "reservation-item";
            const formattedWaktu = new Date(item.waktuISO).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
            
            card.innerHTML = `
                <div class="name">${item.nama} <span style="font-size:10px; font-weight:normal; opacity:0.6;">(${item.telp})</span></div>
                <div class="details"><strong>Alamat:</strong> ${item.alamat}</div>
                <div class="details"><strong>Jadwal:</strong> ${formattedWaktu}</div>
                <div class="details"><strong>Layanan:</strong> ${item.layanan}</div>
                <div class="price">Rp ${item.total.toLocaleString('id-ID')}</div>
                <div class="reservation-actions-panel">
                    <button class="btn-acc" onclick="approveReservationAction(${item.id})">✔ ACC</button>
                    <button class="btn-reject" onclick="rejectReservationAction(${item.id})">✕ Tolak</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function approveReservationAction(id) {
        let dataReservasi = localStorage.getItem("adzkiya_reservation_data");
        dataReservasi = dataReservasi ? JSON.parse(dataReservasi) : [];
        const index = dataReservasi.findIndex(x => x.id === id);
        if (index === -1) return;

        // Ambil item dari antrean reservasi
        const approvedItem = dataReservasi.splice(index, 1)[0];
        localStorage.setItem("adzkiya_reservation_data", JSON.stringify(dataReservasi));

        // Tambahkan ke Rekapan Utama
        let dataRekap = localStorage.getItem("adzkiya_recap_data");
        dataRekap = dataRekap ? JSON.parse(dataRekap) : [];
        
        dataRekap.unshift(approvedItem);
        localStorage.setItem("adzkiya_recap_data", JSON.stringify(dataRekap));

        alert("✓ Reservasi disetujui dan BERHASIL dimasukkan ke Rekapan Utama!");
        loadReservationRecords();
        loadRecapRecords();
    }

    function rejectReservationAction(id) {
        if (!confirm("Apakah Anda yakin ingin menghapus/menolak reservasi ini?")) return;
        let dataReservasi = localStorage.getItem("adzkiya_reservation_data");
        dataReservasi = dataReservasi ? JSON.parse(dataReservasi) : [];
        dataReservasi = dataReservasi.filter(x => x.id !== id);
        localStorage.setItem("adzkiya_reservation_data", JSON.stringify(dataReservasi));
        loadReservationRecords();
    }

    function loadRecapRecords() {
        const container = document.getElementById('recapListContainer');
        if (!container) return;
        container.innerHTML = "";

        let dataRekap = localStorage.getItem("adzkiya_recap_data");
        dataRekap = dataRekap ? JSON.parse(dataRekap) : [];

        calculateMonthlyRevenueReport(dataRekap);

        if (dataRekap.length === 0) {
            container.innerHTML = `<div style="text-align:center; font-size:12px; opacity:0.5; padding:20px;">Belum ada rekapan data transaksi.</div>`;
            return;
        }

        let grouped = {};
        dataRekap.forEach(item => {
            const mKey = item.kelompokBulan || "Lainnya";
            if (!grouped[mKey]) grouped[mKey] = [];
            grouped[mKey].push(item);
        });

        for (const bulan in grouped) {
            const groupTitle = document.createElement('div');
            groupTitle.className = "month-group-title";
            let subTotalBulan = grouped[bulan].reduce((s, i) => s + (i.total || 0), 0);
            groupTitle.innerHTML = `<span>📅 ${bulan.toUpperCase()}</span> <span>Rp ${subTotalBulan.toLocaleString('id-ID')}</span>`;
            container.appendChild(groupTitle);

            grouped[bulan].forEach(item => {
                const card = document.createElement('div');
                card.className = "recap-item";
                const formattedWaktu = new Date(item.waktuISO).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                
                card.innerHTML = `
                    <div class="name">${item.nama}</div>
                    <div class="details"><strong>HP:</strong> ${item.telp} | <strong>Alamat:</strong> ${item.alamat}</div>
                    <div class="details"><strong>Treatment:</strong> ${item.layanan}</div>
                    <div class="details" style="font-size:10px; opacity:0.6;">Dibuat: ${item.tanggal} | Jadwal: ${formattedWaktu}</div>
                    <div class="price">Rp ${item.total.toLocaleString('id-ID')}</div>
                    <button class="btn-item-action btn-reprint" title="Cetak Ulang Kwitansi" onclick="reprintInvoicePDFDataDirect(${item.id})">🖨️</button>
                    <button class="btn-item-action btn-delete" title="Hapus Data" onclick="deleteRecapRecordItem(${item.id})">🗑️</button>
                `;
                container.appendChild(card);
            });
        }
    }

    function calculateMonthlyRevenueReport(dataRekap) {
        const incomeContainer = document.getElementById('incomeRowsContainer');
        if (!incomeContainer) return;
        incomeContainer.innerHTML = "";

        let mapRevenue = {};
        dataRekap.forEach(item => {
            const mKey = item.kelompokBulan || "Lainnya";
            mapRevenue[mKey] = (mapRevenue[mKey] || 0) + (item.total || 0);
        });

        if (Object.keys(mapRevenue).length === 0) {
            incomeContainer.innerHTML = `<div style="opacity:0.5; font-style:italic;">Belum ada omset tercatat.</div>`;
            return;
        }

        for (const bln in mapRevenue) {
            const row = document.createElement('div');
            row.className = "income-row";
            row.innerHTML = `<span class="month-lbl">${bln}</span><span class="amount-val">Rp ${mapRevenue[bln].toLocaleString('id-ID')}</span>`;
            incomeContainer.appendChild(row);
        }
    }

    function deleteRecapRecordItem(id) {
        if (!confirm("Hapus item riwayat rekapan ini secara permanen?")) return;
        let dataRekap = localStorage.getItem("adzkiya_recap_data");
        dataRekap = dataRekap ? JSON.parse(dataRekap) : [];
        dataRekap = dataRekap.filter(x => x.id !== id);
        localStorage.setItem("adzkiya_recap_data", JSON.stringify(dataRekap));
        loadRecapRecords();
    }

    function clearAllRecapRecords() {
        if (!confirm("PERINGATAN Kritis! Tindakan ini akan menghapus seluruh data rekapan selamanya. Lanjutkan?")) return;
        localStorage.removeItem("adzkiya_recap_data");
        loadRecapRecords();
    }

        const telp = document.getElementById('nomorHp').value.trim();
        const alamat = document.getElementById('alamatPasien').value.trim();

        let totalAkhir = Math.max(0, totalLayanan - diskon);

        const rawServicesStructured = JSON.parse(JSON.stringify(selectedServices));
        const daftarLayananText = selectedServices.map(s => s.name).join(", ");
        
        const now = new Date();

        const tanggalLengkap = now.toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });

        };

    function switchCategoryTab(categoryId, element) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        document.querySelectorAll('.menu-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(`pane-${categoryId}`).classList.add('active');
    }

    function toggleServiceSelection(service, category, checkbox, itemElement) {
        if (checkbox.checked) {
            selectedServices.push({ ...service, kategori: category });
            itemElement.classList.add('selected');
        } else {
            selectedServices = selectedServices.filter(s => !(s.name === service.name && s.kategori === category));
            itemElement.classList.remove('selected');
        }
        calculateLiveTotalBill();
    }

    function calculateLiveTotalBill() {
        let total = selectedServices.reduce((sum, s) => sum + s.price, 0);
        let diskonElement = document.getElementById('diskonHarga');
        let diskon = diskonElement ? (parseInt(diskonElement.value) || 0) : 0;
        let grandTotal = Math.max(0, total - diskon);
        document.getElementById('liveTotalDisplay').innerText = `Rp ${grandTotal.toLocaleString('id-ID')}`;
    }

    function scrollServiceList(direction) {
        const container = document.getElementById('serviceContainer');

    function importDatabaseFromJSON(input) {
        if (!input.files || input.files[0] === undefined) return;
        showDatabaseAnimationLoader("Membaca Berkas File...", "Menganalisis integritas data objek...");
        
        const file = input.files[0];
        const reader = new FileReader();
        
        reader.onload = function(e) {
            try {
                let importedObj = JSON.parse(e.target.result);
                let finalRecap = [];
                let finalReservations = [];
                let finalLogo = "";

                // Deteksi Array Transaksi Mentah Langsung (Format file Backup_Ledger_Adzkiya milik user)
                if (Array.isArray(importedObj)) {
                    if (importedObj.length > 0) {
                        let sample = importedObj[0];
                        let keys = Object.keys(sample).join('').toLowerCase();
                        if (keys.includes('bulan') || keys.includes('layanan') || keys.includes('total') || keys.includes('nama')) {
                            finalRecap = importedObj;
                        } else {
                            finalReservations = importedObj;
                        }
                    }
                } else if (importedObj && typeof importedObj === 'object') {
                    finalRecap = importedObj.recap || importedObj.recap_data || [];
                    finalReservations = importedObj.reservations || importedObj.reservation_data || [];
                    finalLogo = importedObj.savedLogo || importedObj.logo || "";
                    
                    if (finalRecap.length === 0 && importedObj.data && Array.isArray(importedObj.data)) {
                        finalRecap = importedObj.data;
                    }
                }

                if (finalRecap.length > 0 || finalReservations.length > 0) {
                    animatePercentageCounter(0, 100, 1200, 
                        (currentValue) => { updateLoaderPercentage(currentValue); },
                        () => {
                            localStorage.setItem("adzkiya_reservation_data", JSON.stringify(finalReservations));
                            localStorage.setItem("adzkiya_recap_data", JSON.stringify(finalRecap));
                            
                            if (finalLogo) {
                                base64LogoDataStream = finalLogo;
                                const uiWatermark = document.getElementById('uiWatermarkView');
                                if (uiWatermark) {
                                    uiWatermark.src = base64LogoDataStream;
                                    uiWatermark.style.display = "block";
                                }
                            }
                            
                            endDatabaseAnimationLoader(true, "Restorasi berkas sukses dimasukkan!", () => {
                                loadReservationRecords();
                                loadRecapRecords();
                                calculateLiveTotalBill();
                            });
                        }
                    );
                } else {
                    endDatabaseAnimationLoader(false, "Berkas kosong atau format tidak cocok.");
                    alert("Gagal: Berkas JSON tidak berisi array transaksi yang valid.");
                }
            } catch (err) {
                endDatabaseAnimationLoader(false, "Gagal mengurai enkripsi berkas data.");
            }
        };
        reader.readAsText(file);
    }

    function cloudGoogleDriveSync(actionType) {
        if (!GOOGLE_APPS_SCRIPT_URL || GOOGLE_APPS_SCRIPT_URL.includes("YOUR_")) {
            alert("Sistem Cloud Google Drive belum diaktifkan. Konfigurasikan Web App URL Apps Script Anda.");
            return;
        }

        let serverResponded = false;
        let currentSimulatedProgress = 0;

        if (actionType === "backup") {
            showDatabaseAnimationLoader("Menghubungkan ke Cloud...", "Mengunggah paket berkas enkripsi...");
            
            let payloadData = {
                action: "backup",
                reservations: JSON.parse(localStorage.getItem("adzkiya_reservation_data") || "[]"),
                recap: JSON.parse(localStorage.getItem("adzkiya_recap_data") || "[]"),
                logo: base64LogoDataStream
            };

            animatePercentageCounter(0, 85, 2000, (val) => {
                if (!serverResponded) { currentSimulatedProgress = val; updateLoaderPercentage(currentSimulatedProgress); }
            });

            fetch(GOOGLE_APPS_SCRIPT_URL, {
                method: "POST",
                mode: "cors",
                redirect: "follow",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payloadData)
            })
            .then(response => response.json())
            .then(res => {
                serverResponded = true;
                if (res.status === "success" || res.message === "success") {
                    animatePercentageCounter(currentSimulatedProgress, 100, 400, (val) => { updateLoaderPercentage(val); }, () => {
                        endDatabaseAnimationLoader(true, "Data aman tersimpan di Google Drive!");
                    });
                } else {
                    endDatabaseAnimationLoader(false, "Gagal: " + (res.message || "Respon eksternal tidak diketahui"));
                }
            })
            .catch(err => {
                serverResponded = true;
                endDatabaseAnimationLoader(false, "Gangguan koneksi jaringan online.");
            });

        } else {
            showDatabaseAnimationLoader("Mengunduh Dari Cloud...", "Mengambil snapshots dari Server Drive...");
            
            animatePercentageCounter(0, 85, 2500, (val) => {
                if (!serverResponded) { currentSimulatedProgress = val; updateLoaderPercentage(currentSimulatedProgress); }
            });

            const fetchUrlWithGetEngine = GOOGLE_APPS_SCRIPT_URL + "?action=restore&timestamp=" + Date.now();

            fetch(fetchUrlWithGetEngine, {
                method: "GET",
                mode: "cors",
                redirect: "follow"
            })
            .then(response => response.text())
            .then(textMentah => {
                serverResponded = true;
                
                if (textMentah.trim().startsWith("<!DOCTYPE") || textMentah.includes("google-signin") || textMentah.includes("Login")) {
                    endDatabaseAnimationLoader(false, "Akses Google Apps Script Terblokir.");
                    alert("⚠️ KESALAHAN DEPLOYMENT APPS SCRIPT:\n\nServer mengembalikan halaman web login Google, bukan data JSON.\n\nSolusi Penting:\n1. Buka Google Apps Script Anda.\n2. Klik 'Deploy' -> 'Manage Deployments'.\n3. Ubah bagian 'Who has access' menjadi 'Anyone' (Semua Orang), lalu klik Deploy.\n4. Salin kembali link Web App yang BARU.");
                    return;
                }

                let res;
                try {
                    res = JSON.parse(textMentah);
                } catch(e) {
                    let cleanJsonStr = textMentah.match(/\{.*\}/s) || textMentah.match(/\[.*?\]/s);
                    if (cleanJsonStr) { try { res = JSON.parse(cleanJsonStr[0]); } catch(err2){} }
                }

                if (!res) {
                    endDatabaseAnimationLoader(false, "Format data dari server salah.");
                    alert("⚠️ RESPON KANVAS SERVER BUKAN DATA VALID:\n\nFormat respons tidak dikenali.");
                    return;
                }

                let detectedRecap = [];
                let detectedReservations = [];

                // Cek format array murni langsung
                if (Array.isArray(res)) {
                    if (res.length > 0) {
                        let sample = res[0];
                        let keys = Object.keys(sample).join('').toLowerCase();
                        if (keys.includes('bulan') || keys.includes('layanan') || keys.includes('total')) {
                            detectedRecap = res;
                        } else {
                            detectedReservations = res;
                        }
                    }
                } else if (res && typeof res === 'object') {
                    let kumpulArray = [];
                    function cariArray(obj) {
                        if (!obj || typeof obj !== 'object') return;
                        if (Array.isArray(obj)) { if (obj.length > 0) kumpulArray.push(obj); return; }
                        for (let k in obj) {
                            if (obj.hasOwnProperty(k)) {
                                let v = obj[k];
                                if (typeof v === 'string' && (v.trim().startsWith('[') || v.trim().startsWith('{'))) {
                                    try { cariArray(JSON.parse(v)); } catch(e){}
                                } else if (typeof v === 'object' && v !== null) { cariArray(v); }
                            }
                        }
                    }
                    cariArray(res);

                    if (kumpulArray.length > 0) {
                        kumpulArray.sort((a,b) => b.length - a.length);
                        let idxR = kumpulArray.findIndex(arr => {
                            if(arr.length > 0 && typeof arr[0] === 'object') {
                                return Object.keys(arr[0]).join('').toLowerCase().includes('bulan') || Object.keys(arr[0]).join('').toLowerCase().includes('layanan');
                            }
                            return false;
                        });
                        if (idxR !== -1) {
                            detectedRecap = kumpulArray[idxR];
                            let sisa = kumpulArray.filter((_, i) => i !== idxR);
                            if (sisa.length > 0) detectedReservations = sisa[0];
                        } else {
                            detectedRecap = kumpulArray[0];
                            if (kumpulArray.length > 1) detectedReservations = kumpulArray[1];
                        }
                    }

                    if (detectedRecap.length === 0) {
                        let d = res.recap || res.data || res.content || [];
                        if (typeof d === 'string') { try{ d = JSON.parse(d); }catch(e){} }
                        if (Array.isArray(d)) detectedRecap = d;
                    }
                }

                // JIKA VALIDASI AKHIR TETAP KOSONG (Seperti kasus dalam screenshot user di mana server hanya merespon {"status":"success"} tanpa isi)
                if (detectedRecap.length === 0 && detectedReservations.length === 0) {
                    endDatabaseAnimationLoader(false, "Isi Database di Cloud Memang Kosong.");
                    alert("ℹ️ KONEKSI SUKSES, NAMUN DATA DI DRIVE ANDA KOSONG:\n\nKotak diagnosis mendeteksi server cloud Anda merespon: '" + textMentah.trim() + "'.\n\nArtinya, skrip Web App terhubung dengan baik tetapi file database di Google Drive Anda memang tidak berisi data transaksi.\n\nSolusi: Silakan pakai tombol 'RESTORE DATA OFFLINE' di bawahnya untuk memasukkan file data 'Backup_Ledger_Adzkiya_1779723559391.json' yang tadi Anda upload ke saya.");
                    return;
                }

                if (!Array.isArray(detectedRecap)) detectedRecap = [];
                if (!Array.isArray(detectedReservations)) detectedReservations = [];

                let detectedLogo = res.logo || res.savedLogo || "";

                animatePercentageCounter(currentSimulatedProgress, 100, 400, (val) => { updateLoaderPercentage(val); }, () => {
                    localStorage.setItem("adzkiya_reservation_data", JSON.stringify(detectedReservations));
                    localStorage.setItem("adzkiya_recap_data", JSON.stringify(detectedRecap));
                    if (detectedLogo) {
                        base64LogoDataStream = detectedLogo;
                        const uiWatermark = document.getElementById('uiWatermarkView');
                        if (uiWatermark) { uiWatermark.src = base64LogoDataStream; uiWatermark.style.display = "block"; }
                    }
                    endDatabaseAnimationLoader(true, "Sinkronisasi Cloud Drive Berhasil!", () => {
                        loadReservationRecords();
                        loadRecapRecords();
                        calculateLiveTotalBill();
                    });
                });
            })
            .catch(err => {
                serverResponded = true;
                endDatabaseAnimationLoader(false, "Gagal memproses data cloud.");
                alert("Error Jaringan / CORS: " + err.message);
            });
        }
    }

                <Column ss:Width="90"/>
                <Column ss:Width="100"/>
                <Column ss:Width="120"/>
                <Column ss:Width="110"/>
                <Column ss:Width="200"/>
                <Column ss:Width="90"/>
                <Column ss:Width="80"/>
                <Column ss:Width="80"/>
                <Column ss:Width="90"/>
                
                <Row ss:Height="30">
                    <Cell ss:MergeAcross="9" ss:StyleID="HeaderStyle"><Data ss:Type="String">LAPORAN REKAPAN OMSET - ADZKIYA MOM BABY CARE</Data></Cell>
                </Row>
                <Row ss:Height="10"><Cell ss:MergeAcross="9" ss:StyleID="Default"/></Row>
                <Row ss:Height="24">
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">NO</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">TANGGAL INPUT</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">NAMA PASIEN</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">NO WHATSAPP</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">ALAMAT</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">DAFTAR TREATMENT SELECTED</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">JADWAL BOOKING</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">SUBTOTAL</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">POT. DISKON</Data></Cell>
                    <Cell ss:StyleID="TableHead"><Data ss:Type="String">TOTAL NET</Data></Cell>
                </Row> `;

        let grouped = {};
        dataRekap.forEach(item => {
            const mKey = item.kelompokBulan || "Lainnya";
            if (!grouped[mKey]) grouped[mKey] = [];
            grouped[mKey].push(item);
        });

        let counter = 1;
        for (const monthName in grouped) {
            excelTemplate += `
                <Row ss:Height="22">
                    <Cell ss:MergeAcross="9" ss:StyleID="MonthTitleStyle"><Data ss:Type="String"> BULAN: ${monthName.toUpperCase()}</Data></Cell>
                </Row>`;

            let monthlySubtotal = 0;
            let monthlyDiskon = 0;
            let monthlyTotal = 0;

            grouped[monthName].forEach(d => {
                monthlySubtotal += (d.subtotal || d.total || 0);
                monthlyDiskon += (d.diskon || 0);
                monthlyTotal += (d.total || 0);

                let cleanLayanan = htmlEscapeSpecial(d.layanan);
                let cleanNama = htmlEscapeSpecial(d.nama);
                let cleanAlamat = htmlEscapeSpecial(d.alamat);
                let formattedBooking = d.waktuISO ? new Date(d.waktuISO).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }) : "-";

                excelTemplate += `
                <Row ss:Height="20">
                    <Cell ss:StyleID="NormalCenter"><Data ss:Type="Number">${counter++}</Data></Cell>
                    <Cell ss:StyleID="NormalCenter"><Data ss:Type="String">${d.tanggal || "-"}</Data></Cell>
                    <Cell ss:StyleID="NormalLeft"><Data ss:Type="String">${cleanNama}</Data></Cell>
                    <Cell ss:StyleID="NormalCenter"><Data ss:Type="String">${d.telp || "-"}</Data></Cell>
                    <Cell ss:StyleID="NormalLeft"><Data ss:Type="String">${cleanAlamat}</Data></Cell>
                    <Cell ss:StyleID="NormalLeft"><Data ss:Type="String">${cleanLayanan}</Data></Cell>
                    <Cell ss:StyleID="NormalCenter"><Data ss:Type="String">${formattedBooking}</Data></Cell>
                    <Cell ss:StyleID="CurrencyStyle"><Data ss:Type="Number">${d.subtotal || d.total || 0}</Data></Cell>
                    <Cell ss:StyleID="CurrencyStyle"><Data ss:Type="Number">${d.diskon || 0}</Data></Cell>
                    <Cell ss:StyleID="CurrencyStyle"><Data ss:Type="Number">${d.total || 0}</Data></Cell>
                </Row> `;
            });

            excelTemplate += `
                <Row ss:Height="22">
                    <Cell ss:MergeAcross="6" ss:StyleID="TotalLabelStyle"><Data ss:Type="String">TOTAL ${monthName.toUpperCase()} : </Data></Cell>
                    <Cell ss:StyleID="TotalCurrencyStyle"><Data ss:Type="Number">${monthlySubtotal}</Data></Cell>
                    <Cell ss:StyleID="TotalCurrencyStyle"><Data ss:Type="Number">${monthlyDiskon}</Data></Cell>
                    <Cell ss:StyleID="TotalCurrencyStyle"><Data ss:Type="Number">${monthlyTotal}</Data></Cell>
                </Row>
                <Row ss:Height="10"><Cell ss:MergeAcross="9" ss:StyleID="Default"/></Row> `;
        }

        excelTemplate += `</Table></Worksheet></Workbook> `;

        const blob = new Blob([excelTemplate], { type: "application/vnd.ms-excel" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Rekap_Omset_Adzkiya_Grouped_${Date.now()}.xls`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function htmlEscapeSpecial(str) {
        if(!str) return "";
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
    }
</script>
</body>
</html>
